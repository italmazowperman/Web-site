<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статичная страница — элементы исчезают независимо</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* чтобы не выделялось при кликах */
        }

        body {
            height: 100vh;
            overflow: hidden; /* НЕТ ПРОКРУТКИ! Страница статична */
            background: radial-gradient(circle at 30% 10%, #1a2a3a, #03060c);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Статичный фон-текст (просто для атмосферы) */
        .bg-text {
            position: fixed;
            font-size: 10vw;
            font-weight: bold;
            color: rgba(255,255,255,0.02);
            white-space: nowrap;
            bottom: 5%;
            right: 5%;
            pointer-events: none;
            font-family: monospace;
        }

        /* Контейнер со "свободными" элементами */
        .stage {
            position: relative;
            width: 80vw;
            height: 80vh;
            max-width: 1200px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }

        /* Каждый элемент-карточка может исчезать по-своему */
        .floating-card {
            background: rgba(30, 40, 60, 0.7);
            backdrop-filter: blur(12px);
            padding: 1.5rem 2rem;
            border-radius: 2rem;
            width: 200px;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            will-change: transform, filter, opacity;
        }

        .floating-card:hover {
            background: rgba(50, 70, 100, 0.8);
            transform: scale(1.02);
        }

        h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Кнопка сброса (чтобы вернуть элементы) */
        .reset-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: 0.2s;
            z-index: 200;
            font-family: monospace;
        }

        .reset-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }

        /* Подсказка */
        .info {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 40px;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="bg-text">✦ STATIC ✦ NO SCROLL ✦</div>

<div class="stage">
    <!-- Карточка 1 - исчезает размытием -->
    <div class="floating-card" data-effect="blur">
        <h3>🌀 Размытие</h3>
        <p>кликни — растворюсь в дымке</p>
    </div>

    <!-- Карточка 2 - уползает влево -->
    <div class="floating-card" data-effect="slideLeft">
        <h3>⬅️ Влево</h3>
        <p>уеду за край экрана</p>
    </div>

    <!-- Карточка 3 - уползает вправо -->
    <div class="floating-card" data-effect="slideRight">
        <h3>➡️ Вправо</h3>
        <p>исчезну в правой тьме</p>
    </div>

    <!-- Карточка 4 - вращение + затухание -->
    <div class="floating-card" data-effect="rotateFade">
        <h3>🔄 Вращение</h3>
        <p>повернусь и растворюсь</p>
    </div>

    <!-- Карточка 5 - сжатие в точку -->
    <div class="floating-card" data-effect="scaleDown">
        <h3>📌 В точку</h3>
        <p>сожмусь до нуля</p>
    </div>
</div>

<button class="reset-btn" id="resetBtn">⟳ ВЕРНУТЬ ВСЕ ЭЛЕМЕНТЫ</button>
<div class="info">Нет скролла — статичная страница. Жми на любой блок → исчезает по-своему</div>

<script>
    // Получаем все карточки
    const cards = document.querySelectorAll('.floating-card');
    const resetBtn = document.getElementById('resetBtn');

    // Функция для анимированного исчезновения элемента
    function disappear(element, effectType) {
        // Если уже исчезает или исчез — не трогаем
        if (element.dataset.disappearing === 'true') return;

        element.dataset.disappearing = 'true';
        
        // Длительность анимации
        const duration = 500; // ms
        
        // В зависимости от эффекта – разные CSS-трансформации
        switch(effectType) {
            case 'blur':
                element.style.transition = `all ${duration}ms cubic-bezier(0.2, 0.9, 0.6, 1.1)`;
                element.style.filter = 'blur(20px)';
                element.style.opacity = '0';
                break;
            case 'slideLeft':
                element.style.transition = `all ${duration}ms ease-out`;
                element.style.transform = 'translateX(-200vw) rotate(-20deg)';
                element.style.opacity = '0';
                break;
            case 'slideRight':
                element.style.transition = `all ${duration}ms ease-out`;
                element.style.transform = 'translateX(200vw) rotate(20deg)';
                element.style.opacity = '0';
                break;
            case 'rotateFade':
                element.style.transition = `all ${duration}ms cubic-bezier(0.4, 0.0, 0.2, 1)`;
                element.style.transform = 'perspective(400px) rotateY(90deg) scale(0.5)';
                element.style.opacity = '0';
                break;
            case 'scaleDown':
                element.style.transition = `all ${duration}ms cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
                element.style.transform = 'scale(0)';
                element.style.opacity = '0';
                break;
            default:
                // стандартное затухание
                element.style.transition = `opacity ${duration}ms`;
                element.style.opacity = '0';
        }
        
        // После завершения анимации скрываем элемент (чтобы не занимал место, но можно оставить visibility hidden)
        setTimeout(() => {
            element.style.visibility = 'hidden';
            // Полностью убираем кликабельность
            element.style.pointerEvents = 'none';
        }, duration);
    }
    
    // Функция для возврата всех элементов в исходное состояние
    function resetAllCards() {
        cards.forEach(card => {
            // Сбрасываем флаг
            delete card.dataset.disappearing;
            // Убираем инлайн-стили, которые добавляла анимация
            card.style.transition = '';
            card.style.filter = '';
            card.style.opacity = '';
            card.style.transform = '';
            card.style.visibility = 'visible';
            card.style.pointerEvents = 'auto';
            
            // Небольшой форсированный reflow для плавности (опционально)
            void card.offsetHeight;
        });
    }
    
    // Навешиваем обработчики на карточки — каждый знает свой эффект из data-effect
    cards.forEach(card => {
        const effect = card.getAttribute('data-effect');
        card.addEventListener('click', (e) => {
            e.stopPropagation(); // чтобы случайно не задеть родителя
            disappear(card, effect);
        });
    });
    
    // Кнопка сброса
    resetBtn.addEventListener('click', () => {
        resetAllCards();
    });
    
    // Делаем небольшую заметку в консоль
    console.log('Статичная страница готова! Элементы исчезают независимо от фона, скролла нет.');
</script>

</body>
</html>
